        {q:"HDMI mengirimkan...", o:["Suara","Gambar","Audio & Video bersamaan","Listrik","Data"], correct: "Audio & Video bersamaan", p:"AV Standard."},
        {q:"'Disk Cleanup' berfungsi untuk...", o:["Hapus virus","Hapus file sampah sistem","Edit","Simpan","Cetak"], correct: "Hapus file sampah sistem", p:"System maintenance."},
        {q:"Operating System (OS) adalah...", o:["Ketik","Software utama pengelola sistem","Mouse","Net","Layar"], correct: "Software utama pengelola sistem", p:"System core."},
        {q:"Blue Screen (BSOD) menandakan...", o:["Kotor","Error kritis sistem/hardware","Lepas","Klik","Mati"], correct: "Error kritis sistem/hardware", p:"Critical crash."},
        {q:"'Phishing' adalah upaya...", o:["Mancing","Tipu data via link palsu","Game","Edit","Follower"], correct: "Tipu data via link palsu", p:"Social engineering."},
        {q:"'Cache' browser berguna untuk...", o:["Pass","Data sementara agar loading web cepat","Hapus","Cari","Kirim"], correct: "Data sementara agar loading web cepat", p:"Local storage web elements."},
        {q:"Satuan kecepatan internet adalah...", o:["Hertz","Byte","bps (bits per second)","Watt","Volt"], correct: "bps (bits per second)", p:"Bit transfer speed."},
        {q:"'Motherboard' berfungsi...", o:["Layar","Papan utama koneksi komponen","Simpan","Adem","Input"], correct: "Papan utama koneksi komponen", p:"Mainboard circuit."},
        {q:"'Incognito' mode bertujuan agar...", o:["Hacker","Browser tidak simpan riwayat/cookies","Gratis","Cepat","Kunci"], correct: "Browser tidak simpan riwayat/cookies", p:"Local privacy."},
        {q:"BIOS berfungsi untuk...", o:["Foto","Cek hardware saat booting","Word","Cetak","Hapus"], correct: "Cek hardware saat booting", p:"Pre-boot check."},
        {q:"Kabel tercepat internet adalah...", o:["Tembaga","Fiber Optic","Coaxial","Telp","Listrik"], correct: "Fiber Optic", p:"Light-speed data."},
        {q:"USB adalah singkatan dari...", o:["United","Universal Serial Bus","Ultra","Unique","Unit"], correct: "Universal Serial Bus", p:"Universal port."},
        {q:"'Router' berfungsi untuk...", o:["Cetak","Arahkan trafik data antar jaringan","Simpan","Video","Hapus"], correct: "Arahkan trafik data antar jaringan", p:"Traffic routing."},
        {q:"Manakah layanan Cloud Storage?", o:["Word","Google Drive","Windows","Chrome","CPU"], correct: "Google Drive", p:"Cloud storage."},
        {q:"Task Manager (Ctrl+Shift+Esc) untuk...", o:["Mati","Kelola proses & beban sistem","Edit","Tabel","Kunci"], correct: "Kelola proses & beban sistem", p:"Resource monitor."},
        {q:"'Kernel' adalah...", o:["Desktop","Inti OS","Antivirus","Font","Logo"], correct: "Inti OS", p:"Core manager."},
        {q:"GPU bertugas khusus untuk...", o:["Teks","Proses grafis & video","Listrik","Suara","Cetak"], correct: "Proses grafis & video", p:"Graphics processor."}
    ];

    let questions = []; 
    const labels = ["A", "B", "C", "D", "E"];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        const input = document.getElementById('userNameInput').value.trim();
        if(input === "") { alert("Mohon masukkan nama!"); return; }
        pesertaName = input;
        
        questions = rawQuestions.map((item) => {
            let originalOptions = [...item.o];
            let shuffledOptions = shuffleArray(originalOptions);
            let newCorrectLabel = labels[shuffledOptions.indexOf(item.correct)];
            return {
                q: item.q,
                o: shuffledOptions,
                a: newCorrectLabel,
                p: item.p,
                originalCorrectText: item.correct
            };
        });

        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('userDisplay').textContent = "PESERTA: " + pesertaName.toUpperCase();
        startTimer();
        initQuestions();
    }

    function startTimer() {
        setInterval(() => {
            if(timeLeft <= 0) finish();
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        }, 1000);
    }

    function initQuestions() {
        const cont = document.getElementById('soalContainer');
        const grid = document.getElementById('gridNav');
        questions.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `q-wrapper ${i === 0 ? 'active' : ''}`;
            div.id = `q${i}`;
            let cat = i < 25 ? "WORD ADVANCE" : i < 50 ? "EXCEL ADVANCE" : i < 75 ? "PPT ADVANCE" : "IT SECURITY & HARDWARE";
            let optHtml = '';
            s.o.forEach((opt, idx) => {
                optHtml += `<label><input type="radio" name="ans${i}" value="${labels[idx]}" onclick="selectAns(${i}, '${labels[idx]}')"> ${labels[idx]}. ${opt}</label>`;
            });
            div.innerHTML = `<div class="q-text-header">${cat} | NO. ${i + 1}</div><div class="q-text">${s.q}</div><div class="options">${optHtml}</div>`;
            cont.appendChild(div);
            const btn = document.createElement('button');
            btn.id = `nav${i}`; btn.textContent = i + 1;
            btn.onclick = () => jump(i);
            grid.appendChild(btn);
        });
        updateUI();
    }

    let userAnswers = new Array(rawQuestions.length).fill(null);
    function selectAns(idx, val) {
        userAnswers[idx] = val;
        document.getElementById(`nav${idx}`).classList.add('done');
        if(idx < questions.length - 1) setTimeout(() => move(1), 300);
    }
    function jump(idx) {
        document.querySelector('.q-wrapper.active').classList.remove('active');
        document.getElementById(`q${idx}`).classList.add('active');
        currentIdx = idx; updateUI(); window.scrollTo(0,0);
    }
    let currentIdx = 0;
    function move(step) { let t = currentIdx + step; if(t >= 0 && t < questions.length) jump(t); }
    function updateUI() {
        document.querySelectorAll('.nav-grid button').forEach(b => b.classList.remove('current'));
        document.getElementById(`nav${currentIdx}`).classList.add('current');
        document.getElementById('prevBtn').disabled = currentIdx === 0;
        document.getElementById('nextBtn').disabled = currentIdx === questions.length - 1;
    }

    function finish() {
        if(!confirm("Kirim seluruh jawaban?")) return;
        
        const finishBtn = document.getElementById('finishBtn');
        finishBtn.disabled = true;
        finishBtn.textContent = "MENGIRIM...";

        let score = 0;
        const rekap = document.getElementById('rekapBody');
        rekap.innerHTML = '';
        
        questions.forEach((s, i) => {
            const isCorrect = userAnswers[i] === s.a;
            if(isCorrect) score++;
            rekap.innerHTML += `<tr class="${isCorrect ? 'rev-correct' : 'rev-wrong'}"><td>${i+1}</td><td><strong>${s.q}</strong><br><small>Kunci: ${s.a} (${s.originalCorrectText})</small><br><p><em>Pembahasan: ${s.p}</em></p></td><td style="text-align:center">${isCorrect ? 'BENAR' : 'SALAH'}</td></tr>`;
        });

        // INTEGRASI GOOGLE SHEETS
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nama: pesertaName, skor: score })
        })
        .then(() => {
            console.log("Data berhasil dikirim");
            showResults(score);
        })
        .catch(error => {
            console.error('Error:', error);
            showResults(score); // Tetap tampilkan hasil meski fetch gagal
        });
    }

    function showResults(score) {
        document.getElementById('scoreText').textContent = score;
        document.getElementById('soalContainer').style.display = 'none';
        document.getElementById('navFooter').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        window.scrollTo(0,0);
    }
</script>
