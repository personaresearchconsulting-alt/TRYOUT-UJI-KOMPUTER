        {q: "Shortcut F4 saat menulis rumus berfungsi untuk...", o: ["Menghapus", "Menambah $ (Absolut)", "Mencetak", "Keluar", "Simpan"], a: "Menambah $ (Absolut)"},
        {q: "Guna fitur 'Conditional Formatting' adalah...", o: ["Menghitung otomatis", "Memberi warna sel secara otomatis berdasarkan aturan", "Mengunci sel", "Menghapus duplikat", "Membuat tabel"], a: "Memberi warna sel secara otomatis berdasarkan aturan"},
        {q: "Fungsi 'UPPER' digunakan untuk...", o: ["Huruf kecil semua", "Huruf besar semua", "Huruf depan besar", "Hapus spasi", "Gabung teks"], a: "Huruf besar semua"},
        {q: "Fungsi 'LOWER' digunakan untuk...", o: ["Huruf besar semua", "Huruf kecil semua", "Huruf depan besar", "Hapus spasi", "Gabung teks"], a: "Huruf kecil semua"},
        {q: "Fungsi 'PROPER' digunakan untuk...", o: ["Huruf besar semua", "Huruf kecil semua", "Huruf depan setiap kata menjadi besar", "Hapus spasi", "Gabung teks"], a: "Huruf depan setiap kata menjadi besar"},
        {q: "Fitur untuk menghapus data yang ganda secara otomatis adalah...", o: ["Remove Duplicates", "Filter", "Sort", "Data Validation", "Consolidate"], a: "Remove Duplicates"},
        {q: "Shortcut Ctrl + T pada Excel digunakan untuk...", o: ["Mencetak", "Membuat Table resmi (Format as Table)", "Simpan", "Buka", "Tutup"], a: "Membuat Table resmi (Format as Table)"}
    ];

    let currentIdx = 0;
    const expiredDate = "2026-08-01"; // Expired Date sesuai protokol

    function startQuiz() {
        const today = new Date().toISOString().split('T')[0];
        if (today > expiredDate) {
            alert("Maaf, link simulasi ini sudah kadaluwarsa (1 Agustus 2026).");
            return;
        }
        const name = document.getElementById('userNameInput').value.trim();
        if (!name) { alert("Masukkan nama Anda!"); return; }
        pesertaName = name;
        document.getElementById('login-overlay').style.display = 'none';
        
        // MIX & SHUFFLE
        questions = questions.sort(() => Math.random() - 0.5); // Acak Soal
        questions.forEach(q => {
            q.o = q.o.sort(() => Math.random() - 0.5); // Acak Pilihan
        });
        
        initQuiz();
    }

    function initQuiz() {
        const container = document.getElementById('soalContainer');
        const grid = document.getElementById('gridNav');
        questions.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'q-wrapper';
            div.id = `q${i}`;
            let optionsHtml = s.o.map((opt, idx) => {
                const char = String.fromCharCode(97 + idx);
                return `<label><input type="radio" name="ans${i}" value="${opt}" onchange="handelAnswer(${i})"> ${char.toUpperCase()}. ${opt}</label>`;
            }).join('');
            div.innerHTML = `<div class="q-text">${i+1}. ${s.q}</div><div class="options">${optionsHtml}</div>`;
            container.appendChild(div);

            const btn = document.createElement('button');
            btn.id = `nav${i}`;
            btn.innerText = i + 1;
            btn.onclick = () => jump(i);
            grid.appendChild(btn);
        });
        showSoal(0);
    }

    function handelAnswer(idx) {
        document.getElementById(`nav${idx}`).classList.add('done');
        if (currentIdx < questions.length - 1) {
            setTimeout(() => { move(1); }, 400); // Auto Next
        }
    }

    function showSoal(idx) {
        document.querySelectorAll('.q-wrapper').forEach(el => el.classList.remove('active'));
        document.getElementById(`q${idx}`).classList.add('active');
        document.querySelectorAll('.nav-grid button').forEach(el => el.classList.remove('current'));
        document.getElementById(`nav${idx}`).classList.add('current');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').innerText = (idx === questions.length - 1) ? "SELESAI" : "LANJUT";
        document.getElementById('pageInfo').innerText = `Soal ${idx + 1} / 100`;
        currentIdx = idx;
    }

    function move(step) {
        if (currentIdx === questions.length - 1 && step === 1) {
            finishQuiz();
            return;
        }
        showSoal(currentIdx + step);
    }

    function jump(idx) { showSoal(idx); }

    function finishQuiz() {
        if (!confirm("Apakah Anda yakin ingin mengakhiri ujian 100 soal ini?")) return;
        
        let scoreCount = 0;
        const body = document.getElementById('rekapBody');
        body.innerHTML = "";

        questions.forEach((s, i) => {
            const sel = document.querySelector(`input[name="ans${i}"]:checked`);
            const uAnsText = sel ? sel.value : null;
            const isCorrect = (uAnsText === s.a);
            if (isCorrect) scoreCount++;

            const row = body.insertRow();
            row.innerHTML = `
                <td style="text-align:center">${i+1}</td>
                <td>
                    <strong>${s.q}</strong><br>
                    <small>Jawab: ${uAnsText || "-"} | Kunci: ${s.a}</small>
                </td>
                <td style="text-align:center" class="${isCorrect ? 'status-benar' : 'status-salah'}">${isCorrect ? 'BENAR' : 'SALAH'}</td>
            `;
        });

        const finalScore = scoreCount; // Karena 100 soal, skor = jumlah benar
        document.getElementById('scoreText').innerText = finalScore;
        document.getElementById('displayUserName').innerText = pesertaName.toUpperCase();
        
        const msg = finalScore >= 75 ? "SELAMAT! ANDA LULUS PASSING GRADE." : "MAAF, NILAI ANDA DI BAWAH PASSING GRADE.";
        document.getElementById('gradeMsg').innerText = msg;
        document.getElementById('gradeMsg').style.color = finalScore >= 75 ? "green" : "red";

        document.getElementById('soalContainer').style.display = 'none';
        document.getElementById('navFooter').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("SERTIFIKAT HASIL SIMULASI TKK", 105, 20, { align: "center" });
        doc.setFontSize(12);
        doc.text("Nama Peserta: " + pesertaName.toUpperCase(), 105, 30, { align: "center" });
        doc.setFontSize(30);
        doc.text("SKOR: " + document.getElementById('scoreText').textContent, 105, 45, { align: "center" });
        doc.setFontSize(10);
        doc.text("Diselenggarakan oleh: Persona Research & Consulting", 105, 55, { align: "center" });
        
        const rows = [];
        questions.forEach((s, i) => {
            const sel = document.querySelector(`input[name="ans${i}"]:checked`);
            const uAnsText = sel ? sel.value : "-";
            rows.push([i+1, s.q + "\nJawaban: " + uAnsText + " | Kunci: " + s.a, uAnsText === s.a ? "BENAR" : "SALAH"]);
        });

        doc.autoTable({
            startY: 65,
            head: [['No', 'Pertanyaan & Analisis', 'Status']],
            body: rows,
            theme: 'striped',
            headStyles: { fillColor: [0, 0, 0] }
        });
        doc.save(`Hasil_TKK_100_Mix_${pesertaName}.pdf`);
    }
</script>
