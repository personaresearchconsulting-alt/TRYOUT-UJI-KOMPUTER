        {q: "Ekstensi file untuk program yang dapat dieksekusi/diinstall adalah...", o: [".txt", ".zip", ".exe", ".xlsx", ".mp4"], a: ".exe"},
        {q: "Kumpulan dari beberapa file yang disimpan bersama dalam satu wadah disebut...", o: ["Icon", "Folder", "Shortcut", "Drive", "Desktop"], a: "Folder"},
        {q: "Untuk menghapus file secara permanen tanpa masuk Recycle Bin, shortcutnya...", o: ["Delete", "Shift + Delete", "Ctrl + Delete", "Alt + Delete", "Space + Delete"], a: "Shift + Delete"},
        {q: "Pencipta Microsoft yang merupakan salah satu orang terkaya di dunia adalah...", o: ["Steve Jobs", "Bill Gates", "Mark Zuckerberg", "Jeff Bezos", "Elon Musk"], a: "Bill Gates"},
        {q: "Istilah 'Cold Booting' artinya...", o: ["Menyalakan komputer dari posisi mati", "Menyalakan komputer dari posisi hang", "Mematikan komputer", "Membersihkan komputer", "Mendinginkan processor"], a: "Menyalakan komputer dari posisi mati"},
        {q: "Untuk mengambil tangkapan layar (screenshot) di Windows, tekan tombol...", o: ["Home", "End", "Print Screen (PrtSc)", "Insert", "Scroll Lock"], a: "Print Screen (PrtSc)"},
        {q: "Software yang dibagikan gratis namun dalam jangka waktu tertentu disebut...", o: ["Freeware", "Shareware", "Adware", "Open Source", "Commercial"], a: "Shareware"},
        {q: "Satuan terkecil data dalam komputer adalah...", o: ["Byte", "Bit", "KB", "MB", "GB"], a: "Bit"},
        {q: "1 Kilobyte (KB) setara dengan...", o: ["100 Byte", "1000 Byte", "1024 Byte", "1042 Byte", "1000 Bit"], a: "1024 Byte"},
        {q: "Brainware dalam sistem komputer merujuk pada...", o: ["Monitor", "Windows", "Manusia/Pengguna", "Processor", "Kabel"], a: "Manusia/Pengguna"}
    ];

    let currentIdx = 0;
    const expiredDate = "2026-08-01";

    function startQuiz() {
        const today = new Date().toISOString().split('T')[0];
        if (today > expiredDate) {
            alert("Masa berlaku link simulasi telah berakhir.");
            return;
        }
        const name = document.getElementById('userNameInput').value.trim();
        if (!name) { alert("Masukkan nama Anda!"); return; }
        pesertaName = name;
        document.getElementById('login-overlay').style.display = 'none';
        
        // MIX & SHUFFLE
        questions = questions.sort(() => Math.random() - 0.5);
        questions.forEach(q => {
            q.o = q.o.sort(() => Math.random() - 0.5);
        });
        
        initQuiz();
    }

    function initQuiz() {
        const container = document.getElementById('soalContainer');
        const grid = document.getElementById('gridNav');
        questions.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'q-wrapper';
            div.id = `q${i}`;
            let optionsHtml = s.o.map((opt, idx) => {
                const char = String.fromCharCode(97 + idx);
                return `<label><input type="radio" name="ans${i}" value="${opt}" onchange="handelAnswer(${i})"> ${char.toUpperCase()}. ${opt}</label>`;
            }).join('');
            div.innerHTML = `<div class="q-text">${i+1}. ${s.q}</div><div class="options">${optionsHtml}</div>`;
            container.appendChild(div);

            const btn = document.createElement('button');
            btn.id = `nav${i}`;
            btn.innerText = i + 1;
            btn.onclick = () => jump(i);
            grid.appendChild(btn);
        });
        showSoal(0);
    }

    function handelAnswer(idx) {
        document.getElementById(`nav${idx}`).classList.add('done');
        if (currentIdx < questions.length - 1) {
            setTimeout(() => { move(1); }, 400);
        }
    }

    function showSoal(idx) {
        document.querySelectorAll('.q-wrapper').forEach(el => el.classList.remove('active'));
        document.getElementById(`q${idx}`).classList.add('active');
        document.querySelectorAll('.nav-grid button').forEach(el => el.classList.remove('current'));
        document.getElementById(`nav${idx}`).classList.add('current');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').innerText = (idx === questions.length - 1) ? "SELESAI" : "LANJUT";
        document.getElementById('pageInfo').innerText = `Soal ${idx + 1} / 100`;
        currentIdx = idx;
    }

    function move(step) {
        if (currentIdx === questions.length - 1 && step === 1) {
            finishQuiz();
            return;
        }
        showSoal(currentIdx + step);
    }

    function jump(idx) { showSoal(idx); }

    function finishQuiz() {
        if (!confirm("Akhiri ujian 100 soal Paket C?")) return;
        
        let scoreCount = 0;
        const body = document.getElementById('rekapBody');
        body.innerHTML = "";

        questions.forEach((s, i) => {
            const sel = document.querySelector(`input[name="ans${i}"]:checked`);
            const uAnsText = sel ? sel.value : null;
            const isCorrect = (uAnsText === s.a);
            if (isCorrect) scoreCount++;

            const row = body.insertRow();
            row.innerHTML = `
                <td style="text-align:center">${i+1}</td>
                <td>
                    <strong>${s.q}</strong><br>
                    <small>Jawaban: ${uAnsText || "-"} | Kunci: ${s.a}</small>
                </td>
                <td style="text-align:center" class="${isCorrect ? 'status-benar' : 'status-salah'}">${isCorrect ? 'BENAR' : 'SALAH'}</td>
            `;
        });

        document.getElementById('scoreText').innerText = scoreCount;
        document.getElementById('displayUserName').innerText = pesertaName.toUpperCase();
        
        const msg = scoreCount >= 75 ? "ANDA DINYATAKAN LULUS (ASPEK PENGETAHUAN)" : "ANDA BELUM MENCAPAI NILAI STANDAR LULUS.";
        document.getElementById('gradeMsg').innerText = msg;
        document.getElementById('gradeMsg').style.color = scoreCount >= 75 ? "green" : "red";

        document.getElementById('soalContainer').style.display = 'none';
        document.getElementById('navFooter').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("HASIL TKK POLRI (PPT, INTERNET, HARDWARE)", 105, 20, { align: "center" });
        doc.setFontSize(12);
        doc.text("Nama: " + pesertaName.toUpperCase() + " | Skor: " + document.getElementById('scoreText').textContent, 105, 30, { align: "center" });
        
        const rows = [];
        questions.forEach((s, i) => {
            const sel = document.querySelector(`input[name="ans${i}"]:checked`);
            const uAnsText = sel ? sel.value : "-";
            rows.push([i+1, s.q + "\nJawaban: " + uAnsText + " | Kunci: " + s.a, uAnsText === s.a ? "BENAR" : "SALAH"]);
        });

        doc.autoTable({
            startY: 40,
            head: [['No', 'Pertanyaan & Analisis', 'Status']],
            body: rows,
            theme: 'striped',
            headStyles: { fillColor: [0, 0, 0] }
        });
        doc.save(`TKK_PaketC_${pesertaName}.pdf`);
    }
</script>
