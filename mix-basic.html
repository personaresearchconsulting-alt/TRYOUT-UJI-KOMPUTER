        {q:"Orang yang operasikan komputer...", o:["Hardware","Software","Brainware","Firmware","Malware"], a:"Brainware", p:"Manusia adalah komponen cerdasnya (Brainware)."},
        {q:"Alat hubungkan internet...", o:["Printer","Scanner","Modem","Monitor","Mouse"], a:"Modem", p:"Modem merubah sinyal digital ke analog/sebaliknya."},
        {q:"Scanner berfungsi untuk...", o:["Cetak","Pindai fisik ke digital","Video","Suara","Simpan"], a:"Pindai fisik ke digital", p:"Merubah kertas/dokumen menjadi file gambar/PDF."}
    ];

    let questions = [];
    let userAnswers = [];
    let currentIdx = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        pesertaName = document.getElementById('userNameInput').value.trim();
        if(!pesertaName) { alert("Nama wajib diisi!"); return; }
        
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('userDisplay').textContent = "PESERTA: " + pesertaName.toUpperCase();
        
        questions = shuffle([...rawQuestions]);
        userAnswers = new Array(questions.length).fill(null);
        
        initUI();
        startTimer();
    }

    function initUI() {
        const cont = document.getElementById('soalContainer');
        const grid = document.getElementById('gridNav');
        questions.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `q-wrapper ${i === 0 ? 'active' : ''}`;
            div.id = `q${i}`;
            
            let opts = "";
            const labels = ['A','B','C','D','E'];
            s.o.forEach((opt, idx) => {
                opts += `<label><input type="radio" name="ans${i}" value="${opt}" onclick="save(${i}, '${opt}')"> ${labels[idx]}. ${opt}</label>`;
            });

            div.innerHTML = `<div style="font-weight:bold; color:var(--gold); margin-bottom:10px;">SOAL NO. ${i+1}</div>
                             <div style="font-size:1.3em; font-weight:600; margin-bottom:20px;">${s.q}</div>
                             <div class="options">${opts}</div>`;
            cont.appendChild(div);

            const btn = document.createElement('button');
            btn.id = `nav${i}`; btn.textContent = i + 1;
            btn.onclick = () => jump(i);
            grid.appendChild(btn);
        });
    }

    // FUNGSI SAVE DENGAN AUTO-NEXT
    function save(idx, val) {
        userAnswers[idx] = val;
        const navBtn = document.getElementById(`nav${idx}`);
        if(navBtn) navBtn.classList.add('done');

        // Fitur Auto-Next
        if (idx < questions.length - 1) {
            setTimeout(() => {
                move(1);
            }, 300); 
        }
    }

    function jump(idx) {
        document.querySelector('.q-wrapper.active').classList.remove('active');
        document.getElementById(`q${idx}`).classList.add('active');
        currentIdx = idx;
        updateButtons();
        window.scrollTo(0,0);
    }

    function move(step) { 
        let target = currentIdx + step;
        if(target >= 0 && target < questions.length) jump(target); 
    }

    function updateButtons() {
        document.querySelectorAll('.nav-grid button').forEach(b => b.classList.remove('current'));
        document.getElementById(`nav${currentIdx}`).classList.add('current');
        document.getElementById('prevBtn').disabled = currentIdx === 0;
        document.getElementById('nextBtn').disabled = currentIdx === questions.length - 1;
    }

    function startTimer() {
        const timerInt = setInterval(() => {
            if(timeLeft <= 0) { clearInterval(timerInt); finish(); }
            timeLeft--;
            let m = Math.floor(timeLeft/60);
            let s = timeLeft%60;
            document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        }, 1000);
    }

    function finish() {
        if(!confirm("Kirim jawaban sekarang?")) return;
        
        const finishBtn = document.getElementById('finishBtn');
        finishBtn.disabled = true;
        finishBtn.textContent = "MENGIRIM...";

        let score = 0;
        const rekap = document.getElementById('rekapBody');
        rekap.innerHTML = '';
        
        questions.forEach((s, i) => {
            const isCorrect = userAnswers[i] === s.a;
            if(isCorrect) score++;
            rekap.innerHTML += `
                <tr style="background:${isCorrect ? '#F0FDF4' : '#FEF2F2'}">
                    <td>${i+1}</td>
                    <td>
                        <b>${s.q}</b><br>
                        <small>Jawaban Anda: ${userAnswers[i] || 'KOSONG'} | Kunci: ${s.a}</small><br>
                        <div style="margin-top:10px; font-style:italic; font-size:0.9em; color:#555">Pembahasan: ${s.p}</div>
                    </td>
                    <td style="text-align:center; font-weight:bold; color:${isCorrect ? '#10B981' : '#DC2626'}">${isCorrect ? 'BENAR' : 'SALAH'}</td>
                </tr>`;
        });

        // KIRIM KE GOOGLE SHEETS
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nama: pesertaName, skor: score })
        })
        .then(() => {
            showFinal(score);
        })
        .catch(err => {
            console.error(err);
            showFinal(score);
        });
    }

    function showFinal(score) {
        document.getElementById('scoreText').textContent = score;
        document.getElementById('soalContainer').style.display = 'none';
        document.getElementById('navFooter').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        const tag = document.getElementById('statusTag');
        if(score >= 75) {
            tag.textContent = "MEMENUHI SYARAT (MS)";
            tag.style.background = "#D1FAE5"; tag.style.color = "#065F46";
        } else {
            tag.textContent = "TIDAK MEMENUHI SYARAT (TMS)";
            tag.style.background = "#FEE2E2"; tag.style.color = "#991B1B";
        }
        window.scrollTo(0,0);
    }
</script>
</body>
