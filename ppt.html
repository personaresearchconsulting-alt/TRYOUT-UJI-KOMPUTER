<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAT POWERPOINT - Persona Research & Consulting</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --ivory: #FFFFF0; --black: #000000; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--ivory); color: var(--black); margin: 0; padding: 10px; line-height: 1.4; display: flex; flex-direction: column; min-height: 100vh; user-select: none; }
        
        .container { max-width: 850px; background: white; margin: auto; padding: 15px; border-radius: 10px; border-top: 6px solid var(--black); box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 1; display: flex; flex-direction: column; }
        
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 15px; padding-bottom: 10px; }
        .header h2 { margin: 0; font-size: 1.2em; font-weight: 900; text-transform: uppercase; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 12px; text-align: center; border-top: 5px solid var(--gold); width: 90%; max-width: 400px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 6px; font-size: 1em; text-align: center; }

        .q-wrapper { display: none; width: 100%; }
        .q-wrapper.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .q-text { color: var(--black); font-weight: bold; font-size: 1.1em; margin-bottom: 15px; border-left: 4px solid var(--gold); padding-left: 10px; }
        .options { display: grid; gap: 8px; }
        .options label { display: flex; align-items: center; padding: 12px; background: #fefefe; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 1em; color: var(--black); transition: 0.2s; }
        .options label:hover { background: #fff9e6; border-color: var(--gold); }
        .options input { margin-right: 12px; transform: scale(1.3); accent-color: var(--black); }

        .nav-footer { margin-top: 30px; padding-top: 15px; border-top: 1px solid #eee; }
        .nav-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-bottom: 15px; }
        .nav-grid button { padding: 6px 0; font-size: 0.75em; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 4px; color: var(--black); }
        .nav-grid button.done { background: var(--black); color: white; border-color: var(--black); }
        .nav-grid button.current { border: 2px solid var(--gold); font-weight: bold; }

        .btn-action { background: var(--black); color: white; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 1em; transition: 0.3s; margin: 5px; }
        .btn-action:hover { background: var(--gold); color: var(--black); }
        .btn-download { background: #28a745; }

        #result-area { display: none; text-align: center; padding: 20px 0; }
        .score-val { font-size: 4.5em; font-weight: bold; color: var(--black); margin: 5px 0; }
        
        .rekap-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85em; text-align: left; }
        .rekap-table th, .rekap-table td { border: 1px solid #ddd; padding: 10px; }
        .rekap-table th { background: #f2f2f2; text-align: center; }
        .status-benar { color: green; font-weight: bold; }
        .status-salah { color: red; font-weight: bold; }

        .page-footer { text-align: center; padding: 15px; font-size: 0.9em; color: var(--black); font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false" oncopy="return false" oncut="return false">

<div id="login-overlay">
    <div class="login-box">
        <h3 style="margin-top:0;">SIMULASI CAT POWERPOINT</h3>
        <p>Silakan masukkan nama peserta:</p>
        <input type="text" id="userNameInput" placeholder="Ketik Nama Lengkap..." autocomplete="off">
        <button class="btn-action" onclick="startQuiz()">MULAI SIMULASI</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h2>PERSONA RESEARCH & CONSULTING</h2>
        <small style="color: var(--gold); font-weight: bold; letter-spacing: 1px;">MODUL: MICROSOFT POWERPOINT</small>
    </div>

    <form id="quizForm">
        <div id="soalContainer"></div>
        
        <div id="result-area">

</div>

<footer class="page-footer">

    function startQuiz() {
        const input = document.getElementById('userNameInput').value.trim();
        if(input === "") { alert("Mohon masukkan nama Anda!"); return; }
        pesertaName = input;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('displayUserName').textContent = "PESERTA: " + pesertaName.toUpperCase();
    }

    function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
    const questions = shuffle([...rawQuestions]);
    let currentIdx = 0;
    const cont = document.getElementById('soalContainer');
    const grid = document.getElementById('gridNav');

    questions.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = `q-wrapper ${i === 0 ? 'active' : ''}`;
        div.id = `q${i}`;
        let optHtml = '';
        s.o.forEach((opt, idx) => {
            const code = String.fromCharCode(97 + idx);
            optHtml += `<label><input type="radio" name="ans${i}" value="${code}" onclick="handleAutoNext(${i})">${code.toUpperCase()}. ${opt}</label>`;
        });
        div.innerHTML = `<div class="q-text">${i + 1}. ${s.q}</div><div class="options">${optHtml}</div>`;
        cont.appendChild(div);
        const btn = document.createElement('button');
        btn.id = `nav${i}`; btn.textContent = i + 1;
        btn.onclick = () => jump(i);
        grid.appendChild(btn);
    });

    function jump(idx) {
        document.querySelector('.q-wrapper.active').classList.remove('active');
        document.getElementById(`q${idx}`).classList.add('active');
        currentIdx = idx; updateUI(); window.scrollTo(0,0);
    }
    function move(step) { let t = currentIdx + step; if(t >= 0 && t < questions.length) jump(t); }
    function handleAutoNext(idx) { document.getElementById(`nav${idx}`).classList.add('done'); if(idx < questions.length - 1) setTimeout(() => move(1), 400); }
    function updateUI() {
        document.querySelectorAll('.nav-grid button').forEach(b => b.classList.remove('current'));
        document.getElementById(`nav${currentIdx}`).classList.add('current');
        document.getElementById('prevBtn').disabled = currentIdx === 0;
        const nBtn = document.getElementById('nextBtn');
        if(currentIdx === questions.length - 1) { nBtn.textContent = 'SELESAI'; nBtn.onclick = finish; }
        else { nBtn.textContent = 'LANJUT'; nBtn.onclick = () => move(1); }
    }

    function finish() {
        let benar = 0; const rekap = document.getElementById('rekapBody'); rekap.innerHTML = '';
        questions.forEach((s, i) => {
            const sel = document.querySelector(`input[name="ans${i}"]:checked`);
            const uAnsVal = sel ? sel.value : null;
            const uAnsText = sel ? s.o[uAnsVal.charCodeAt(0) - 97] : "Tidak Dijawab";
            const cAnsText = s.o[s.a.charCodeAt(0) - 97];
            const isC = uAnsVal === s.a; if(isC) benar++;
            rekap.innerHTML += `<tr><td style="text-align:center">${i+1}</td><td><strong>${s.q}</strong><br><span style="color: ${isC ? 'green' : 'red'}">Jawaban Anda: ${uAnsText}</span><br><span style="color: black">Kunci: ${cAnsText}</span></td><td style="text-align:center" class="${isC?'status-benar':'status-salah'}">${isC?'BENAR':'SALAH'}</td></tr>`;
        });
        document.getElementById('scoreText').textContent = ((benar / questions.length) * 100).toFixed(1);
        document.getElementById('soalContainer').style.display = 'none';
        document.getElementById('navFooter').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        window.scrollTo(0,0);
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text("HASIL SIMULASI CAT POWERPOINT", 105, 15, { align: "center" });
        doc.setFontSize(10);
        doc.text("Nama Peserta: " + pesertaName.toUpperCase(), 105, 23, { align: "center" });
        doc.text("Skor Akhir: " + document.getElementById('scoreText').textContent, 105, 28, { align: "center" });
        
        const rows = [];
        questions.forEach((s, i) => {
            const sel = document.querySelector(`input[name="ans${i}"]:checked`);
            const uAnsVal = sel ? sel.value : null;
            const uAnsText = sel ? s.o[uAnsVal.charCodeAt(0) - 97] : "-";
            const cAnsText = s.o[s.a.charCodeAt(0) - 97];
            rows.push([i+1, s.q + "\nJawab: " + uAnsText + " | Kunci: " + cAnsText, uAnsVal === s.a ? "BENAR" : "SALAH"]);
        });

        doc.autoTable({
            head: [['No', 'Pertanyaan & Jawaban', 'Status']],
            body: rows, startY: 35, theme: 'grid', headStyles: { fillColor: [0, 0, 0] },
            columnStyles: { 0: { cellWidth: 10 }, 2: { cellWidth: 20 } }
        });
        doc.save("CAT_PowerPoint_" + pesertaName + ".pdf");
    }
    updateUI();
</script>
</body>
</html>
